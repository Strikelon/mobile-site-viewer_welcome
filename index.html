<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Site Viewer</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #f8f9fc;
      color: #090e34;
      line-height: 1.6;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #090e34;
    }

    .header-left img {
      width: 36px;
      height: 36px;
    }

    .header-left span {
      font-size: 18px;
      font-weight: 700;
    }


    /* Main content */
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 75px 24px 120px;
      text-align: center;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      color: #090e34;
      margin-bottom: 48px;
      line-height: 1.3;
    }

    .step {
      margin-bottom: 40px;
    }

    .step-text {
      font-size: 20px;
      color: #959cb1;
      margin-bottom: 20px;
      font-weight: 500;
    }

    .step-image {
      width: 100%;
      max-width: 620px;
      border-radius: 12px;
      border: 1px solid #e0e3ea;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px 24px;
      color: #9ca3af;
      font-size: 14px;
      border-top: 1px solid #e5e7eb;
    }

    /* Responsive */
    @media (max-width: 768px) {
      main {
        padding: 120px 16px 80px;
      }

      h1 {
        font-size: 28px;
        margin-bottom: 36px;
      }

      .step-text {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="header-left" href="/">
      <img src="icons/icon128.png" alt="Mobile Site Viewer logo">
      <span>Mobile Site Viewer</span>
    </a>
  </header>

  <main>
    <h1>&#127881; Now you have a great way to preview any site on mobile</h1>

    <div class="step">
      <p class="step-text">1. Pin the extension for quick access to Mobile Site Viewer.</p>
      <img class="step-image" src="images/step1-2.jpg" alt="How to pin the extension" loading="lazy">
    </div>

    <div class="step">
      <p class="step-text">2. Simply click on the extension icon to open the mobile viewer.</p>
      <img class="step-image" src="images/step3.jpg" alt="How to open Mobile Site Viewer" loading="lazy">
    </div>
  </main>

  <footer>
    &copy; 2026 Mobile Site Viewer. All rights reserved.
  </footer>

</body>
</html>
