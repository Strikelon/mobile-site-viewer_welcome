<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>We&rsquo;re sorry to see you go &mdash; Mobile Site Viewer</title>
  <link rel="icon" type="image/png" sizes="32x32" href="icons/icon32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="icons/icon16.png">
  <link rel="preconnect" href="https://docs.google.com">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="dns-prefetch" href="https://docs.google.com">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background-color: #ffffff;
      color: #090e34;
      line-height: 1.6;
    }

    /* Header */
    header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid #e5e7eb;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #090e34;
    }

    .header-left img {
      width: 36px;
      height: 36px;
    }

    .header-left span {
      font-size: 18px;
      font-weight: 700;
    }

    /* Main content */
    main {
      max-width: 820px;
      margin: 0 auto;
      padding: 87px 24px 60px;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      font-weight: 400;
      color: #5f6368;
      margin-bottom: 40px;
      line-height: 1.3;
    }

    .form-wrapper {
      position: relative;
      display: flex;
      justify-content: center;
      min-height: 720px;
    }

    .form-loader {
      position: absolute;
      top: 60px;
      left: 50%;
      width: 48px;
      height: 48px;
      margin-left: -24px;
      border: 4px solid #ede7f6;
      border-top-color: #673ab7;
      border-radius: 50%;
      animation: form-spin 0.9s linear infinite;
      pointer-events: none;
    }

    .form-loader.is-hidden {
      opacity: 0;
      transition: opacity 0.25s ease;
    }

    @keyframes form-spin {
      to { transform: rotate(360deg); }
    }

    .google-form {
      width: 100%;
      max-width: 720px;
      height: 720px;
      border: 0;
      background: transparent;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .google-form.is-loaded {
      opacity: 1;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 32px 24px;
      color: #9ca3af;
      font-size: 14px;
      border-top: 1px solid #e5e7eb;
    }

    /* Responsive */
    @media (max-width: 768px) {
      main {
        padding: 77px 16px 40px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 28px;
      }

      .form-wrapper {
        min-height: 820px;
      }

      .google-form {
        height: 820px;
      }
    }
  </style>
</head>
<body>
  <header>
    <a class="header-left" href="/">
      <img src="icons/icon128.png" alt="Mobile Site Viewer logo">
      <span>Mobile Site Viewer</span>
    </a>
  </header>

  <main>
    <h1>We&rsquo;re sorry to see you go.</h1>

    <div class="form-wrapper">
      <div class="form-loader" id="formLoader" aria-hidden="true"></div>
      <iframe
        class="google-form"
        id="googleForm"
        src="https://docs.google.com/forms/d/e/1FAIpQLSekqW4KwEtNKh1Jwm_PuHUXo_jQTaEfk4PREZGa-T8sVM6DDQ/viewform?embedded=true"
        title="Uninstall feedback form"
        onload="document.getElementById('googleForm').classList.add('is-loaded'); document.getElementById('formLoader').classList.add('is-hidden');">
        Loading&hellip;
      </iframe>
    </div>
  </main>

  <footer>
    &copy; 2026 Mobile Site Viewer. All rights reserved.
  </footer>

</body>
</html>
